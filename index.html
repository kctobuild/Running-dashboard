<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<style>
  :root{--bg:#0e1117;--panel:#161b24;--panel2:#1c2330;--line:#283142;--txt:#e8edf4;--muted:#8b96a8;--accent:#4dd0a7}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:16px}
  .wrap{max-width:1180px;margin:0 auto}
  h1{font-size:18px;font-weight:600}
  .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:14px 0}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .kpi .v{font-size:20px;font-weight:700}
  .kpi .l{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
  .kpi .x{font-size:11px;color:var(--accent);margin-top:3px}
  .main{display:grid;grid-template-columns:1fr 264px;gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .chead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap}
  .chead .t{font-size:13px;font-weight:600}
  .tabs{display:flex;gap:6px}
  .tab{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer}
  .tab.on{color:#0e1117;background:var(--accent);border-color:var(--accent);font-weight:700}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:4px 9px;font-size:11px;cursor:pointer}
  .btn:hover{color:var(--txt)}
  #wrapChart{position:relative;height:440px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:10px;align-items:center;min-height:18px}
  .lg{display:flex;align-items:center;gap:5px}
  .dot{width:11px;height:11px;border-radius:50%}
  .desc{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
  .side .ph{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .side .pt{font-size:15px;font-weight:700;margin-bottom:2px}
  .side .pd{font-size:11px;color:var(--muted);margin-bottom:12px}
  .prow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:12px}
  .prow .k{color:var(--muted)}
  .prow .v{font-weight:600}
  .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-top:10px}
  .hint{color:var(--muted);font-size:11px;margin-top:12px;line-height:1.5}
  #tt{position:absolute;pointer-events:none;background:rgba(20,25,34,.97);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:11.5px;min-width:170px;opacity:0;transition:opacity .08s;z-index:9;box-shadow:0 6px 20px rgba(0,0,0,.5)}
  #tt .tth{font-weight:700;font-size:12.5px;margin-bottom:2px}
  #tt .ttd{color:var(--muted);font-size:10.5px;margin-bottom:6px}
  #tt .r{display:flex;justify-content:space-between;gap:14px;padding:1px 0}
  #tt .r .k{color:var(--muted)}
  .perfhead{margin:18px 0 8px;font-size:13px;font-weight:700;color:var(--txt)}
  .perfhead span{font-weight:400;color:var(--muted);font-size:11px}
  .perf{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .pcard{position:relative;background:linear-gradient(160deg,#1c2432,#151b24);border:1px solid var(--line);border-top:3px solid var(--line);border-radius:12px;padding:13px 12px 12px;cursor:pointer;transition:.15s}
  .pcard:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.4)}
  .pcard.sel{box-shadow:0 0 0 2px var(--accent)}
  .pcard.r1{border-top-color:#f5c451} .pcard.r2{border-top-color:#c9d1d9} .pcard.r3{border-top-color:#cd8b45}
  .pcard.r4{border-top-color:#4dd0a7} .pcard.r5{border-top-color:#4d9dff}
  .pcard .medal{position:absolute;top:8px;right:9px;font-size:19px;line-height:1}
  .pcard .cat{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);font-weight:700;padding-right:22px}
  .pcard .big{font-size:18px;font-weight:800;margin:5px 0 2px}
  .pcard .meta{font-size:11px;color:var(--muted);line-height:1.4}
  .pcard .why{font-size:10.5px;color:#c3ccda;margin-top:7px;line-height:1.4;border-top:1px solid var(--line);padding-top:7px}
  .analysis{margin-top:14px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .abox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .abox h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:6px}
  .abox .stat{font-size:23px;font-weight:800;line-height:1;margin:2px 0 9px;color:var(--txt)}
  .abox .stat small{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:4px;text-transform:none;letter-spacing:0}
  .abox.warn .stat{color:#f5a623} .abox.hyrox .stat{color:#4d9dff}
  .abox.warn h3{color:#f5a623}
  .abox.hyrox{border-color:#4d9dff55;background:linear-gradient(160deg,#141d2c,#161b24)}
  .abox.hyrox h3{color:#4d9dff}
  .abox.hyrox li:before{background:#4d9dff}
  .abox ul{list-style:none}
  .abox li{font-size:12px;padding:4px 0 4px 14px;position:relative;color:#d6deea;line-height:1.45}
  .abox li:before{content:"";position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .abox.warn li:before{background:#f5a623}
  /* filters */
  .filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:2px 0 14px}
  .filters label{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .filters select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer}
  .filters .fcount{font-size:11px;color:var(--accent)}
  .filters .fclear{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer}
  .filters .fclear:hover{color:var(--txt)}
  /* medal cards for Top Performance */
  .pcard .medal{position:absolute;top:9px;right:11px;font-size:16px}
  .pcard .rk{font-size:10px;color:var(--muted);font-weight:700}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(3,1fr)}.main,.analysis{grid-template-columns:1fr}.perf{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <h1>Running Performance Dashboard</h1>
  <div class="sub" id="sub"></div>

  <div class="filters">
    <label>Period <select id="fMonth"></select></label>
    <label>Type <select id="fType">
      <option value="all">All runs</option>
      <option value="Running">Outdoor</option>
      <option value="tm">Treadmill</option>
    </select></label>
    <span class="fcount" id="fCount"></span>
    <button class="fclear" id="fClear">Clear</button>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="main">
    <div class="card">
      <div class="chead">
        <div class="tabs">
          <button class="tab on" data-v="bubble">Distance vs Pace</button>
          <button class="tab" data-v="trend">Pace &amp; HR Trend</button>
          <button class="tab" data-v="eff">Aerobic Efficiency</button>
          <button class="tab" data-v="load">Weekly Load</button>
        </div>
        <button class="btn" id="reset">Reset zoom</button>
      </div>
      <div id="wrapChart"><canvas id="c"></canvas><div id="tt"></div></div>
      <div class="legend" id="legend"></div>
      <div class="desc" id="cdesc"></div>
    </div>

    <div class="card side">
      <div class="ph">Hovered run</div>
      <div class="pt" id="sTitle">Hover a point</div>
      <div class="pd" id="sDate">move over the chart &rarr;</div>
      <div id="sRows"></div>
      <div id="sBadge"></div>
      <div class="hint">Drag to pan &middot; scroll/pinch to zoom &middot; hover snaps to the nearest run.</div>
    </div>
  </div>

  <div class="perfhead">Top Performance <span>· click a card to spotlight the run on the chart</span></div>
  <div class="perf" id="perf"></div>

  <div class="analysis" id="analysis"></div>
</div>

const runs = DATA.runs, base = DATA.baseline;   // runs are chronological (oldest first)
const fmtPace = s => Math.floor(s/60)+':'+String(Math.round(s%60)).padStart(2,'0');
const shortDate = d => d.slice(5); // MM-DD

// VR = currently visible (filtered) runs, chronological
let VR = runs.slice();
const mean=a=>a.reduce((x,y)=>x+y,0)/a.length;

// KPIs recompute from the filtered set
function renderKPIs(vr){
  const el=document.getElementById('kpis');
  if(!vr.length){el.innerHTML='<div class="kpi"><div class="v">0</div><div class="l">No runs match</div></div>';return;}
  const td=vr.reduce((a,r)=>a+r.dist,0);
  const ap=mean(vr.map(r=>r.pace)), ah=mean(vr.map(r=>r.hr)), ac=mean(vr.map(r=>r.cad));
  const hot=vr.reduce((a,r)=>r.temp>a.temp?r:a), lon=vr.reduce((a,r)=>r.dist>a.dist?r:a);
  const pmin=Math.min(...vr.map(r=>r.pace)), pmax=Math.max(...vr.map(r=>r.pace));
  const kpis=[
    {v:vr.length,l:'Total runs',x:`${vr.filter(r=>r.type==='Running').length} out / ${vr.filter(r=>r.type!=='Running').length} tm`},
    {v:td.toFixed(0)+' km',l:'Total distance',x:(td/vr.length).toFixed(1)+' km avg'},
    {v:fmtPace(ap)+'/km',l:'Avg pace',x:'range '+fmtPace(pmin)+'–'+fmtPace(pmax)},
    {v:Math.round(ah)+' bpm',l:'Avg HR',x:'cad '+Math.round(ac)+' spm'},
    {v:hot.temp+'°C',l:'Hottest run',x:hot.date},
    {v:lon.dist.toFixed(1)+' km',l:'Longest run',x:lon.date},
  ];
  el.innerHTML=kpis.map(k=>`<div class="kpi"><div class="v">${k.v}</div><div class="l">${k.l}</div><div class="x">${k.x}</div></div>`).join('');
}
document.getElementById('sub').textContent=`${runs.length} runs · ${runs.filter(r=>r.type==='Running').length} outdoor / ${runs.filter(r=>r.type!=='Running').length} treadmill · Oct 2, 2025 – Jul 15, 2026`;

// rolling average helper (over the visible set)
function roll(vals,w){const o=[];for(let i=0;i<vals.length;i++){const s=vals.slice(Math.max(0,i-w+1),i+1);o.push(s.reduce((a,b)=>a+b,0)/s.length);}return o;}

function zoneColor(hr){if(hr<150)return '#4d9dff';if(hr<=157)return '#4dd0a7';if(hr<=163)return '#f5a623';return '#ff5d5d';}
const tMin=21,tMax=38, rad=t=>5+(t-tMin)/(tMax-tMin)*15;

// crosshair
const crosshair={id:'crosshair',afterDraw(ch){const a=ch._active;if(!a||!a.length)return;const{ctx,chartArea:ca}=ch;const e=a[0].element;ctx.save();ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(e.x,ca.top);ctx.lineTo(e.x,ca.bottom);ctx.moveTo(ca.left,e.y);ctx.lineTo(ca.right,e.y);ctx.stroke();ctx.restore();}};

const tt=document.getElementById('tt'), wrapEl=document.getElementById('wrapChart');
let chart=null, hoveredIdx=-1, view='bubble';

function tipHTML(r){return `<div class="tth">${r.title}</div>

  <div class="r"><span class="k">Distance</span><span>${r.dist.toFixed(2)} km</span></div>
  <div class="r"><span class="k">Pace</span><span>${r.paceStr}/km</span></div>
  <div class="r"><span class="k">Avg HR</span><span style="color:${zoneColor(r.hr)}">${r.hr} bpm</span></div>

  <div class="r"><span class="k">Temp</span><span>${r.temp}°C</span></div>
  <div class="r"><span class="k">Efficiency</span><span>${r.ef}</span></div>`;}

function placeTip(px,py){let left=px+16,top=py-10;if(left+190>wrapEl.clientWidth)left=px-190;if(top<0)top=6;tt.style.left=left+'px';tt.style.top=top+'px';tt.style.opacity=1;}
function hideTip(){tt.style.opacity=0;if(hoveredIdx!==-1){hoveredIdx=-1;if(view==='bubble')chart.update('none');}}
wrapEl.addEventListener('mouseleave',hideTip);

function updateSide(r){
  document.getElementById('sTitle').textContent=r.title;
  document.getElementById('sDate').textContent=r.dt.replace('T',' ')+' · '+(r.type==='Running'?'Outdoor':'Treadmill');
  const sgn=v=>(v>0?'+':'')+v;
  document.getElementById('sRows').innerHTML=`
    <div class="prow"><span class="k">Distance</span><span class="v">${r.dist.toFixed(2)} km</span></div>
    <div class="prow"><span class="k">Pace</span><span class="v">${r.paceStr} <span style="color:var(--muted)">(${sgn(Math.round(r.pace-base.pace))}s)</span></span></div>
    <div class="prow"><span class="k">Avg HR</span><span class="v" style="color:${zoneColor(r.hr)}">${r.hr} <span style="color:var(--muted)">(${sgn(Math.round(r.hr-base.hr))})</span></span></div>
    <div class="prow"><span class="k">Max HR</span><span class="v">${r.maxhr}</span></div>
    <div class="prow"><span class="k">Cadence</span><span class="v">${r.cad} spm</span></div>
    <div class="prow"><span class="k">Temp</span><span class="v">${r.temp}°C</span></div>
    <div class="prow"><span class="k">Elevation</span><span class="v">${r.asc!=null?r.asc+' m ↑':'— (treadmill)'}</span></div>
    <div class="prow"><span class="k">Efficiency</span><span class="v">${r.ef} <span style="color:var(--muted)">(avg ${base.ef})</span></span></div>
    <div class="prow"><span class="k">HR vs pace</span><span class="v" style="color:${r.hrResid>6?'#ff5d5d':r.hrResid<-6?'#4d9dff':'var(--txt)'}">${sgn(r.hrResid)} bpm</span></div>`;
  let b='';
  if(r.hrResid>6)b='<span class="badge" style="background:#3a1e1e;color:#ff8f8f">High effort for this pace</span>';
  else if(r.temp>=37)b='<span class="badge" style="background:#3a2a12;color:#f5c26b">Extreme heat run</span>';
  else if(r.hrResid<-6)b='<span class="badge" style="background:#12263a;color:#7fbaff">Efficient / cool run</span>';
  else b='<span class="badge" style="background:#1c2330;color:#8b96a8">Within your normal range</span>';
  document.getElementById('sBadge').innerHTML=b;
}

  bubble:`<span style="color:var(--muted)">HR zone:</span>
    <span class="lg"><span class="dot" style="background:#4d9dff"></span>Easy &lt;150</span>

    <span class="lg"><span class="dot" style="background:#f5a623"></span>Threshold 158–163</span>
    <span class="lg"><span class="dot" style="background:#ff5d5d"></span>Hard 164+</span>
    <span class="lg" style="margin-left:auto">◦ small=cool ● large=hot</span>`,
  trend:`<span class="lg"><span class="dot" style="background:#4dd0a7"></span>Pace (5-run avg)</span>
    <span class="lg"><span class="dot" style="background:#ff5d5d"></span>Avg HR (5-run avg)</span>
    <span class="lg" style="color:var(--muted)">faint = per-run values</span>`,
  eff:`<span class="lg"><span class="dot" style="background:#f5a623"></span>Efficiency factor (5-run avg)</span>
    <span class="lg" style="color:var(--muted)">higher = more speed per heartbeat = fitter/cooler</span>`,
  load:`<span class="lg"><span class="dot" style="background:#4dd0a7"></span>Weekly distance (km)</span>
    <span class="lg" style="color:var(--muted)">faint bar = rest / no-run week</span>`
};
const descs={
  bubble:'Each bubble = one run. X distance · Y pace (faster up) · colour HR zone · size temperature. Hover for detail + crosshair.',
  trend:'Fitness/condition over time. Pace and HR lines with a 5-run rolling average smooth out noise — watch for HR rising while pace holds (drift/heat).',
  eff:'Aerobic efficiency = speed per heartbeat. A falling line means the same pace is costing more effort (fatigue, heat, or lost fitness); a rising line means improving aerobic condition.',
  load:'Weekly distance = training load and consistency. Watch for big week-to-week jumps (injury risk) and empty weeks (detraining). Hover any week for its detail.'
};

function buildBubble(){
  const pts=VR.map((r,i)=>({x:r.dist,y:r.pace,r:rad(r.temp),bg:zoneColor(r.hr),idx:i}));
  return new Chart(document.getElementById('c'),{
    type:'bubble',
    data:{datasets:[{data:pts,parsing:false,
      backgroundColor:c=>{const p=pts[c.dataIndex];return hoveredIdx<0||hoveredIdx===p.idx?p.bg+'d9':p.bg+'33';},
      borderColor:c=>{const p=pts[c.dataIndex];return hoveredIdx===p.idx?'#fff':p.bg;},
      borderWidth:c=>hoveredIdx===pts[c.dataIndex].idx?2.5:1}]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'nearest',intersect:false,axis:'xy'},
      plugins:{legend:{display:false},tooltip:{enabled:false},
        zoom:{pan:{enabled:true,mode:'xy'},zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'xy'}}},
      scales:{x:{title:{display:true,text:'Distance (km)',color:'#8b96a8'},grid:{color:'#232b39'},ticks:{color:'#8b96a8'}},
        y:{reverse:true,title:{display:true,text:'Pace (min/km · faster ↑)',color:'#8b96a8'},grid:{color:'#232b39'},ticks:{color:'#8b96a8',callback:v=>fmtPace(v)}}},
      onHover:(e,els)=>{if(els.length){const di=els[0].index,r=VR[di];if(hoveredIdx!==di){hoveredIdx=di;chart.update('none');updateSide(r);}tt.innerHTML=tipHTML(r);const m=chart.getDatasetMeta(0).data[di];placeTip(m.x,m.y);}else hideTip();}},
    plugins:[crosshair]});
}
function timeOpts(yLeft,yRight){
  return {responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{enabled:false},
      zoom:{pan:{enabled:true,mode:'x'},zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'x'}}},
    scales:Object.assign({x:{ticks:{color:'#8b96a8',maxRotation:0,autoSkip:true,maxTicksLimit:10},grid:{color:'#232b39'}}},yLeft,yRight),
    onHover:(e,els)=>{if(els.length){const di=els[0].index,r=VR[di];if(hoveredIdx!==di){hoveredIdx=di;updateSide(r);}tt.innerHTML=tipHTML(r);const x=els[0].element.x;placeTip(x, e.y-30);}else hideTip();}};
}
function buildTrend(){
  const labels=VR.map(r=>shortDate(r.date));
  const rP=roll(VR.map(r=>r.pace),5), rH=roll(VR.map(r=>r.hr),5);
  return new Chart(document.getElementById('c'),{
    type:'line',
    data:{labels,datasets:[
      {label:'Pace',yAxisID:'yP',data:rP,borderColor:'#4dd0a7',backgroundColor:'#4dd0a7',pointRadius:0,borderWidth:2.5,tension:.3},
      {label:'PaceRaw',yAxisID:'yP',data:VR.map(r=>r.pace),borderColor:'#4dd0a733',pointRadius:2,pointBackgroundColor:'#4dd0a7',showLine:false},
      {label:'HR',yAxisID:'yH',data:rH,borderColor:'#ff5d5d',backgroundColor:'#ff5d5d',pointRadius:0,borderWidth:2.5,tension:.3},
      {label:'HRRaw',yAxisID:'yH',data:VR.map(r=>r.hr),borderColor:'#ff5d5d33',pointRadius:2,pointBackgroundColor:'#ff5d5d',showLine:false}
    ]},
    options:timeOpts(
      {yP:{position:'left',reverse:true,title:{display:true,text:'Pace (faster ↑)',color:'#4dd0a7'},grid:{color:'#232b39'},ticks:{color:'#4dd0a7',callback:v=>fmtPace(v)}}},
      {yH:{position:'right',title:{display:true,text:'Avg HR (bpm)',color:'#ff5d5d'},grid:{drawOnChartArea:false},ticks:{color:'#ff5d5d'}}}
    ),
    plugins:[crosshair]});
}
function buildEff(){
  const labels=VR.map(r=>shortDate(r.date));
  const rE=roll(VR.map(r=>r.ef),5);
  return new Chart(document.getElementById('c'),{
    type:'line',
    data:{labels,datasets:[
      {label:'EF',yAxisID:'y',data:rE,borderColor:'#f5a623',backgroundColor:'rgba(245,166,35,.12)',fill:true,pointRadius:0,borderWidth:2.5,tension:.3},
      {label:'EFraw',yAxisID:'y',data:VR.map(r=>r.ef),borderColor:'#f5a62333',pointRadius:2.5,pointBackgroundColor:c=>zoneColor(VR[c.dataIndex].hr),showLine:false}
    ]},
    options:timeOpts(
      {y:{position:'left',title:{display:true,text:'Efficiency (m/min per bpm)',color:'#f5a623'},grid:{color:'#232b39'},ticks:{color:'#f5a623'}}},{}
    ),
    plugins:[crosshair]});
}
// ---- Weekly Load ----
let WK=[];
function weekKey(dateStr){const d=new Date(dateStr+'T00:00:00Z');const day=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-day);return d.toISOString().slice(0,10);}
function buildWeeks(vr){
  const map=new Map();
  vr.forEach(r=>{const k=weekKey(r.date);if(!map.has(k))map.set(k,[]);map.get(k).push(r);});
  const keys=[...map.keys()].sort();
  if(!keys.length)return [];
  const out=[];let cur=new Date(keys[0]+'T00:00:00Z');const end=new Date(keys[keys.length-1]+'T00:00:00Z');
  while(cur<=end){const k=cur.toISOString().slice(0,10);const g=map.get(k)||[];
    out.push({week:k,km:g.reduce((a,r)=>a+r.dist,0),n:g.length,pace:g.length?mean(g.map(r=>r.pace)):0,hr:g.length?mean(g.map(r=>r.hr)):0});
    cur.setUTCDate(cur.getUTCDate()+7);}
  return out;
}
function weekTip(w,px,py){
  tt.innerHTML=`<div class="tth">Week of ${w.week}</div>
    <div class="ttd">${w.n} run${w.n===1?'':'s'}</div>
    <div class="r"><span class="k">Distance</span><span>${w.km.toFixed(1)} km</span></div>`+
    (w.n?`<div class="r"><span class="k">Avg pace</span><span>${fmtPace(w.pace)}/km</span></div>
    <div class="r"><span class="k">Avg HR</span><span>${Math.round(w.hr)} bpm</span></div>`:'<div class="r"><span class="k">Rest week</span><span>—</span></div>');
  placeTip(px,py);
}
function updateSideWeek(w){
  document.getElementById('sTitle').textContent='Week of '+w.week;
  document.getElementById('sDate').textContent=w.n+' run'+(w.n===1?'':'s')+(w.n?'':' · rest');
  document.getElementById('sRows').innerHTML=`
    <div class="prow"><span class="k">Distance</span><span class="v">${w.km.toFixed(1)} km</span></div>
    <div class="prow"><span class="k">Runs</span><span class="v">${w.n}</span></div>`+
    (w.n?`<div class="prow"><span class="k">Avg pace</span><span class="v">${fmtPace(w.pace)}/km</span></div>
    <div class="prow"><span class="k">Avg HR</span><span class="v">${Math.round(w.hr)} bpm</span></div>`:'');
  document.getElementById('sBadge').innerHTML='';
}
function buildLoad(){
  WK=buildWeeks(VR);
  const labels=WK.map(w=>w.week.slice(5));
  return new Chart(document.getElementById('c'),{
    type:'bar',
    data:{labels,datasets:[{data:WK.map(w=>+w.km.toFixed(1)),
      backgroundColor:WK.map(w=>w.n?'#4dd0a7cc':'#232b39'),
      hoverBackgroundColor:WK.map(w=>w.n?'#4dd0a7':'#2c3648'),borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{enabled:false},
        zoom:{pan:{enabled:true,mode:'x'},zoom:{wheel:{enabled:true},pinch:{enabled:true},mode:'x'}}},
      scales:{x:{ticks:{color:'#8b96a8',maxRotation:0,autoSkip:true,maxTicksLimit:11},grid:{display:false}},
        y:{beginAtZero:true,title:{display:true,text:'Weekly distance (km)',color:'#4dd0a7'},grid:{color:'#232b39'},ticks:{color:'#8b96a8'}}},
      onHover:(e,els)=>{if(els.length){const di=els[0].index,w=WK[di];weekTip(w,els[0].element.x,e.y-20);updateSideWeek(w);}else hideTip();}},
    plugins:[crosshair]});
}

function render(v){
  view=v;hoveredIdx=-1;tt.style.opacity=0;
  if(chart)chart.destroy();
  chart = v==='bubble'?buildBubble():v==='trend'?buildTrend():v==='eff'?buildEff():buildLoad();
  document.getElementById('legend').innerHTML=legends[v];
  document.getElementById('cdesc').textContent=descs[v];
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v===v));
  updateKeyInsights(v);
}
// Key Insights box changes with the active chart
function updateKeyInsights(v){
  const box=document.getElementById('kiBox'); if(!box)return;
  const d=insightsByView[v];
  if(!d){ // Weekly Load: no narrative in the insight box
    box.querySelector('h3').innerHTML='📊 Key insights <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">· pick a data chart</span>';
    box.querySelector('.stat').innerHTML=`42 wks<small>trained every week — consistency is your strength</small>`;
    box.querySelector('ul').innerHTML='<li>Weekly Load shows volume & consistency in the bars — hover any week.</li>';
    return;
  }
  box.querySelector('h3').innerHTML=`📊 Key insights <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">· ${d.tag}</span>`;
  box.querySelector('.stat').innerHTML=`${d.stat}<small>${d.statl}</small>`;
  box.querySelector('ul').innerHTML=d.items.map(i=>`<li>${i}</li>`).join('');
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>render(t.dataset.v));
document.getElementById('reset').onclick=()=>{if(chart)chart.resetZoom();};

// ---- Filters (Period + Type) ----
const fMonth=document.getElementById('fMonth'), fType=document.getElementById('fType');
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const monKeys=[...new Set(runs.map(r=>r.date.slice(0,7)))].sort();
fMonth.innerHTML='<option value="all">All months</option>'+monKeys.map(k=>{const p=k.split('-');return `<option value="${k}">${MON[+p[1]-1]} ${p[0]}</option>`;}).join('');
function applyFilters(){
  const m=fMonth.value, t=fType.value;
  VR=runs.filter(r=>(m==='all'||r.date.slice(0,7)===m)&&(t==='all'||(t==='Running'?r.type==='Running':r.type!=='Running')));
  document.getElementById('fCount').textContent=(m==='all'&&t==='all')?`all ${runs.length} runs`:`${VR.length} of ${runs.length} runs`;
  renderKPIs(VR);
  hoveredIdx=-1;tt.style.opacity=0;
  if(VR.length){render(view);}else if(chart){chart.destroy();chart=null;document.getElementById('legend').innerHTML='';document.getElementById('cdesc').textContent='No runs match this filter.';}
}
fMonth.onchange=applyFilters; fType.onchange=applyFilters;
document.getElementById('fClear').onclick=()=>{fMonth.value='all';fType.value='all';applyFilters();};

renderKPIs(VR);
render('bubble');

const perfCards=[

  {medal:'🥈',cat:'Best endurance',date:'2026-03-28',key:'Hong Kong',big:'10.0 km',meta:'Mar 28 · 6:53/km · HR 158',why:'Longest well-controlled run; aerobic effort held to the end.'},
  {medal:'🥉',cat:'Best efficiency',date:'2026-02-23',key:'Treadmill',big:'EF 1.13',meta:'Feb 23 · 6:02/km · HR 147',why:'Most speed per heartbeat — your Feb fitness peak.'},
  {medal:'🎖️',cat:'Strongest finish',date:'2026-01-18',key:'SCB',big:'TE 5.0',meta:'Jan 18 · SCB 10k · 6:37 · HR 175',why:'Highest training effect; pushed hardest to the line (race).'},
  {medal:'🎯',cat:'Cadence consistency',date:'2026-03-05',key:'Kowloon',big:'169 spm',meta:'Mar 5 · avg 169 / max 176',why:'Tightest cadence spread (7 spm) — steadiest turnover.'}
];
let selCard=-1;
function spotlight(runIdx,cardEl,ci){
  if(fMonth.value!=='all'||fType.value!=='all'){fMonth.value='all';fType.value='all';applyFilters();}
  if(view!=='bubble')render('bubble');
  const di=VR.indexOf(runs[runIdx]);
  if(di<0)return;
  hoveredIdx=di;chart.update('none');updateSide(runs[runIdx]);
  const m=chart.getDatasetMeta(0).data[di];tt.innerHTML=tipHTML(runs[runIdx]);placeTip(m.x,m.y);
  document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('sel'));
  cardEl.classList.add('sel');selCard=ci;
}
document.getElementById('perf').innerHTML=perfCards.map((c,i)=>
  `<div class="pcard r${i+1}" data-i="${i}"><span class="medal">${c.medal}</span><div class="cat">${c.cat}</div><div class="big">${c.big}</div><div class="meta">${c.meta}</div><div class="why">${c.why}</div></div>`).join('');
document.querySelectorAll('.pcard').forEach(el=>{
  const i=+el.dataset.i, ri=findRun(perfCards[i].date,perfCards[i].key);
  el.onclick=()=>{ if(ri>=0) spotlight(ri,el,i); };
});
